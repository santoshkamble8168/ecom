name: ecom

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecom}
      POSTGRES_DB: ${POSTGRES_DB:-ecom}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecom}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-devMasterKeyChangeMe}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ecomminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ecomminio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    profiles: ["apps"]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../apps/api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecom}:${POSTGRES_PASSWORD:-ecom}@postgres:5432/${POSTGRES_DB:-ecom}?schema=public
      REDIS_HOST: redis
      MEILISEARCH_HOST: http://meilisearch:7700
      MINIO_ENDPOINT: minio
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  worker:
    profiles: ["apps"]
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy

  storefront:
    profiles: ["apps"]
    build:
      context: ../..
      dockerfile: apps/storefront/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"

  admin:
    profiles: ["apps"]
    build:
      context: ../..
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    depends_on:
      - api
    ports:
      - "3001:3001"

  nginx:
    profiles: ["apps"]
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - storefront
      - admin
      - api

volumes:
  postgres-data:
  redis-data:
  meilisearch-data:
  minio-data:
